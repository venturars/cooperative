name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.pnpm-cache.outputs.STORE_PATH }}
            ~/.local/share/pnpm/store
            node_modules
            **/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Get package version
        id: package_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Package version: $VERSION"

      - name: Get latest tag
        id: get_latest_tag
        run: |
          # Get the latest tag that matches vX.Y.Z pattern
          LATEST_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || echo "")
          echo "latest_tag=${LATEST_TAG}" >> $GITHUB_OUTPUT
          echo "Latest tag: $LATEST_TAG"

      - name: Check if version changed
        id: check_version
        run: |
          PACKAGE_VERSION="${{ steps.package_version.outputs.version }}"
          LATEST_TAG="${{ steps.get_latest_tag.outputs.latest_tag }}"
          
          if [ -z "$LATEST_TAG" ]; then
            echo "No previous tags found, creating first release"
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "tag=v${PACKAGE_VERSION}" >> $GITHUB_OUTPUT
          elif [ "v${PACKAGE_VERSION}" != "$LATEST_TAG" ]; then
            echo "Version changed from $LATEST_TAG to v${PACKAGE_VERSION}"
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "tag=v${PACKAGE_VERSION}" >> $GITHUB_OUTPUT
          else
            echo "Version unchanged ($LATEST_TAG), skipping release"
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Build package
        if: steps.check_version.outputs.should_release == 'true'
        run: pnpm run build

      - name: Create package tarball
        if: steps.check_version.outputs.should_release == 'true'
        run: |
          # Create a clean package directory
          mkdir -p package-dist
          
          # Copy necessary files
          cp -r dist package-dist/
          cp package.json package-dist/
          cp README.md package-dist/
          cp LICENSE package-dist/
          cp .npmignore package-dist/ 2>/dev/null || true
          
          # Create package tarball
          cd package-dist
          npm pack
          
          # Move tarball to root
          mv *.tgz ../cooperative-${{ steps.package_version.outputs.version }}.tgz
          cd ..
          
          echo "📦 Package tarball created: cooperative-${{ steps.package_version.outputs.version }}.tgz"

      - name: Test package installation
        if: steps.check_version.outputs.should_release == 'true'
        run: |
          # Test that the package can be installed and imported
          echo "🧪 Testing package installation..."
          
          # Create a test directory
          mkdir -p test-install
          cd test-install
          
          # Initialize npm project
          npm init -y > /dev/null 2>&1
          
          # Install the tarball
          npm install ../cooperative-${{ steps.package_version.outputs.version }}.tgz
          
          # Test import
          node -e "import('cooperative').then(m => console.log('✅ Package imports successfully. Exports:', Object.keys(m).length, 'functions')).catch(e => { console.error('❌ Import failed:', e.message); process.exit(1); })"
          
          echo "✅ Package installation test passed"
          cd ..

      - name: Generate changelog
        if: steps.check_version.outputs.should_release == 'true'
        id: changelog
        run: |
          LATEST_TAG="${{ steps.get_latest_tag.outputs.latest_tag }}"
          NEW_TAG="${{ steps.check_version.outputs.tag }}"
          
          if [ -z "$LATEST_TAG" ]; then
            # First release - get all commits
            COMMITS=$(git log --pretty=format:"- %s (%h)" --reverse)
            CHANGELOG="## Initial Release\n\n$COMMITS"
          else
            # Get commits since last tag
            COMMITS=$(git log --pretty=format:"- %s (%h)" ${LATEST_TAG}..HEAD)
            
            # Categorize commits
            FEATURES=$(echo "$COMMITS" | grep -iE "^\- feat" || true)
            FIXES=$(echo "$COMMITS" | grep -iE "^\- fix" || true)
            DOCS=$(echo "$COMMITS" | grep -iE "^\- docs" || true)
            CHORE=$(echo "$COMMITS" | grep -iE "^\- chore" || true)
            OTHER=$(echo "$COMMITS" | grep -viE "^\- (feat|fix|docs|chore)" || true)
            
            CHANGELOG="## What's Changed\n\n"
            
            if [ -n "$FEATURES" ]; then
              CHANGELOG+="### 🚀 New Features\n$FEATURES\n\n"
            fi
            
            if [ -n "$FIXES" ]; then
              CHANGELOG+="### 🐛 Bug Fixes\n$FIXES\n\n"
            fi
            
            if [ -n "$DOCS" ]; then
              CHANGELOG+="### 📚 Documentation\n$DOCS\n\n"
            fi
            
            if [ -n "$CHORE" ]; then
              CHANGELOG+="### 🔧 Maintenance\n$CHORE\n\n"
            fi
            
            if [ -n "$OTHER" ]; then
              CHANGELOG+="### Other Changes\n$OTHER\n\n"
            fi
          fi
          
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo -e "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.check_version.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.check_version.outputs.tag }}
          name: ${{ steps.check_version.outputs.tag }}
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: false
          make_latest: true
          generate_release_notes: false
          files: |
            cooperative-${{ steps.package_version.outputs.version }}.tgz
            dist/*
            package.json
            README.md
            LICENSE

      - name: Output release info
        if: steps.check_version.outputs.should_release == 'true'
        run: |
          echo "🎉 Release created: ${{ steps.check_version.outputs.tag }}"
          echo "📦 Package version: ${{ steps.package_version.outputs.version }}"
          echo "🔗 Release URL: https://github.com/${{ github.repository }}/releases/tag/${{ steps.check_version.outputs.tag }}"
          echo "📁 Built package included in release assets"

      - name: Skip release message
        if: steps.check_version.outputs.should_release == 'false'
        run: |
          echo "⏭️  Skipping release - version unchanged"
          echo "Current package version: ${{ steps.package_version.outputs.version }}"
          echo "Latest tag: ${{ steps.get_latest_tag.outputs.latest_tag }}"